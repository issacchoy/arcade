<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peakness Portal Hub</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #121212; color: #fff; margin: 0; padding: 40px; }
        .container { max-width: 600px; margin: auto; padding: 30px; background: #1e1e1e; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid #0052cc; }
        h1 { color: #0052cc; margin-bottom: 5px; }
        .subtitle { color: #aaa; margin-bottom: 25px; }
        
        /* Search Box Styles */
        .search-box { margin-bottom: 30px; padding: 15px; background: #2a2a2a; border-radius: 8px; border: 1px solid #333; }
        .search-input { width: 70%; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #121212; color: white; font-size: 14px; }
        .search-btn { padding: 10px 15px; background: #0052cc; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-left: 5px; }
        .search-btn:hover { background: #003d99; }
        
        /* Grid Styles */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-link { display: block; padding: 20px; background: #2a2a2a; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; border: 1px solid #333; transition: 0.2s; }
        .game-link:hover { background: #0052cc; border-color: #0052cc; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Peakness Portal Hub</h1>
        <p class="subtitle">Launch your custom apps and web utilities:</p>
        
        <!-- Navigation Portal Box -->
        <div class="search-box">
            <form action="https://google.com" method="GET" target="_blank">
                <input type="text" name="q" class="search-input" placeholder="Search the web securely...">
                <button type="submit" class="search-btn">Go</button>
            </form>
        </div>

        <!-- Grid Options -->
        <div class="game-grid">
            <a href="snake.html" class="game-link">Classic Snake</a>
            <a href="flappy.html" class="game-link">Flappy Bird</a>
            <a href="retrobowl.html" class="game-link">Retro Bowl</a>
            <a href="retro.html" class="game-link">Game Boy Emulator</a>
        </div>
    </div>
</body>
</html>
